# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────
# Runs on every push/PR against real Postgres + Redis service
# containers (not mocks), so OTP flow tests exercise the actual
# TTL/idempotency behavior described in the README.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: church
          POSTGRES_PASSWORD: church_test_password
          POSTGRES_DB: church_backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U church -d church_backend_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://church:church_test_password@localhost:5432/church_backend_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_test_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_test_secret_at_least_32_characters_long
      JWT_LOGIN_CHALLENGE_SECRET: ci_test_secret_at_least_32_characters_long
      COOKIE_SECRET: ci_test_secret_at_least_32_characters_long
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
      PAYSTACK_PUBLIC_KEY: pk_test_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Generate Prisma client
        run: yarn prisma:generate

      - name: Apply migrations
        run: yarn prisma:deploy

      - name: Run tests
        run: yarn test --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/