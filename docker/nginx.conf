# docker/nginx.conf
# ──────────────────────────────────────────────────────────────
# Nginx reverse proxy configuration for the Church Backend API.
#
# WHAT THIS DOES
# Sits in front of one or more API instances and:
#   1. Terminates HTTPS (in production, with real certs)
#   2. Forwards requests to the least-busy API instance
#   3. Adds standard security headers
#   4. Limits request body size
#
# This is a PRODUCTION-READY starting point. For local development,
# you don't need Nginx — the API listens directly on PORT.
#
# HOW TO USE
#   1. Replace `api.yourchurch.org` with your real domain
#   2. Replace `church-backend-api:5000` with your API container name
#   3. Add SSL certificates (Let's Encrypt with Certbot is free)
# ──────────────────────────────────────────────────────────────

upstream api_backend {
    # least_conn sends each new request to the instance with the
    # fewest active connections — better than round-robin when
    # some requests (like newsletter sends) take longer than others.
    least_conn;

    # List every API instance here. In docker-compose, these are
    # the service names. For a single instance, one line is fine;
    # add more as you scale.
    server church-backend-api-1:5000;
    server church-backend-api-2:5000;
}

server {
    listen 80;
    server_name api.yourchurch.org;

    # Redirect all HTTP to HTTPS — payment and auth data should
    # never travel unencrypted.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourchurch.org;

    # SSL certificates (paths depend on your setup)
    # ssl_certificate     /etc/letsencrypt/live/api.yourchurch.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourchurch.org/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers (in addition to Helmet in the app) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request size limits ──────────────────────────────────
    # Matches the 10kb JSON body limit in src/app.js
    client_max_body_size 10k;

    # ── Proxy to the API ─────────────────────────────────────
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # Pass the real client IP to the API (important for rate
        # limiting — without this, every request appears to come
        # from Nginx's IP)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (not currently used, but harmless to
        # include and saves a headache if you add real-time features
        # later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Don't buffer responses — let the API stream if it wants to
        proxy_buffering off;

        # Timeouts: 30s is generous for a payment/newsletter API
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Health check endpoint (no auth, no rate limit logging) ──
    location /api/v1/health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        access_log off; # health checks are noisy in logs
    }
}